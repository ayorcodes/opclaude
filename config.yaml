  # Ollama models — requires Ollama running at localhost:11434.
  # `claude-ol-` prefix identifies Ollama-routed models (many are cloud-backed
  # via Ollama's gateway; only models with a real GB size in `ollama list` run
  # locally). The `model:` value must match `ollama list` exactly.

  - model_name: claude-ol-deepseek-v4-flash[1M]
    litellm_params:
      model: openai/deepseek-v4-flash:cloud
      api_base: http://localhost:11434/v1
      api_key: ollama
      use_chat_completions_api: true
    model_info:
      context_window: 1048576

  - model_name: claude-ol-deepseek-v4-pro[512K]
    litellm_params:
      model: openai/deepseek-v4-pro:cloud
      api_base: http://localhost:11434/v1
      api_key: ollama
      use_chat_completions_api: true
    model_info:
      context_window: 524288

