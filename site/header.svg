<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 460" width="900" height="460">
<defs>
  <pattern id="dots" x="0" y="0" width="24" height="24" patternUnits="userSpaceOnUse">
    <circle cx="12" cy="12" r="0.65" fill="rgba(214,232,223,0.055)"/>
  </pattern>
  <filter id="amber-glow" x="-40%" y="-40%" width="180%" height="180%">
    <feGaussianBlur stdDeviation="2.5" result="b"/>
    <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
  <filter id="teal-glow" x="-40%" y="-40%" width="180%" height="180%">
    <feGaussianBlur stdDeviation="2" result="b"/>
    <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
  <!-- Radial glow behind nodes -->
  <radialGradient id="glow-left" cx="25%" cy="67%" r="35%">
    <stop offset="0%" stop-color="rgba(255,176,0,0.06)"/>
    <stop offset="100%" stop-color="rgba(255,176,0,0)"/>
  </radialGradient>
  <radialGradient id="glow-right" cx="75%" cy="67%" r="40%">
    <stop offset="0%" stop-color="rgba(79,216,196,0.07)"/>
    <stop offset="100%" stop-color="rgba(79,216,196,0)"/>
  </radialGradient>
</defs>

<style>
  text { font-family: ui-monospace, 'Cascadia Code', 'SF Mono', Menlo, Consolas, 'Liberation Mono', monospace; }

  /* cursor blink */
  @keyframes blink { 0%,49%{opacity:1} 50%,100%{opacity:0} }
  .cursor { animation: blink 1.1s steps(1) infinite; }

  /* wire glow cycling — 10 s loop, each model lit for ~2 s */
  @keyframes w0 {
    0%      { stroke: rgba(255,107, 87,0.80); }
    16%     { stroke: rgba(255,107, 87,0.10); }
    100%    { stroke: rgba(255,107, 87,0.10); }
  }
  @keyframes w1 {
    0%,16%  { stroke: rgba( 77,155,255,0.10); }
    20%     { stroke: rgba( 77,155,255,0.80); }
    38%     { stroke: rgba( 77,155,255,0.10); }
    100%    { stroke: rgba( 77,155,255,0.10); }
  }
  @keyframes w2 {
    0%,38%  { stroke: rgba(179,136,255,0.10); }
    42%     { stroke: rgba(179,136,255,0.80); }
    60%     { stroke: rgba(179,136,255,0.10); }
    100%    { stroke: rgba(179,136,255,0.10); }
  }
  @keyframes w3 {
    0%,60%  { stroke: rgba(231,210, 74,0.10); }
    64%     { stroke: rgba(231,210, 74,0.80); }
    82%     { stroke: rgba(231,210, 74,0.10); }
    100%    { stroke: rgba(231,210, 74,0.10); }
  }
  @keyframes w4 {
    0%,82%  { stroke: rgba(255, 95,168,0.10); }
    86%     { stroke: rgba(255, 95,168,0.80); }
    100%    { stroke: rgba(255, 95,168,0.80); }
  }
  .wire-0 { animation: w0 10s ease-in-out infinite; }
  .wire-1 { animation: w1 10s ease-in-out infinite; }
  .wire-2 { animation: w2 10s ease-in-out infinite; }
  .wire-3 { animation: w3 10s ease-in-out infinite; }
  .wire-4 { animation: w4 10s ease-in-out infinite; }

  /* model target opacity cycling */
  @keyframes m0 { 0%{opacity:1} 16%{opacity:0.32} 100%{opacity:0.32} }
  @keyframes m1 { 0%,16%{opacity:0.32} 20%{opacity:1} 38%{opacity:0.32} 100%{opacity:0.32} }
  @keyframes m2 { 0%,38%{opacity:0.32} 42%{opacity:1} 60%{opacity:0.32} 100%{opacity:0.32} }
  @keyframes m3 { 0%,60%{opacity:0.32} 64%{opacity:1} 82%{opacity:0.32} 100%{opacity:0.32} }
  @keyframes m4 { 0%,82%{opacity:0.32} 86%{opacity:1} 100%{opacity:1} }
  .target-0 { animation: m0 10s ease-in-out infinite; }
  .target-1 { animation: m1 10s ease-in-out infinite; }
  .target-2 { animation: m2 10s ease-in-out infinite; }
  .target-3 { animation: m3 10s ease-in-out infinite; }
  .target-4 { animation: m4 10s ease-in-out infinite; }

  /* proxy pulse */
  @keyframes proxy-pulse { 0%,100%{opacity:1} 50%{opacity:0.55} }
  .proxy-dot { animation: proxy-pulse 2s ease-in-out infinite; }
</style>

<!-- ═══ BACKGROUND ═══ -->
<rect width="900" height="460" fill="#07090a"/>
<rect width="900" height="460" fill="url(#dots)"/>
<!-- ambient node glows -->
<rect width="900" height="460" fill="url(#glow-left)"/>
<rect width="900" height="460" fill="url(#glow-right)"/>

<!-- ═══ HEADER (y 0→128) ═══ -->

<!-- brand: opclaude_ -->
<text x="40" y="52" font-size="15" font-weight="bold" fill="#d9ebe2" letter-spacing="0.3">opclaude</text>
<text x="120" y="52" font-size="15" font-weight="bold" fill="#ffb000" class="cursor" filter="url(#amber-glow)">_</text>

<!-- right-side notes -->
<text x="860" y="44" font-size="10" fill="#46584f" text-anchor="end">requires opencode Go subscription</text>
<text x="860" y="59" font-size="10" fill="#46584f" text-anchor="end">macOS · MIT license</text>

<!-- kicker -->
<text x="40" y="78" font-size="11" fill="#46584f">// a local proxy that sits in front of claude code</text>

<!-- hero title -->
<text x="40" y="109" font-size="23" font-weight="bold">
  <tspan fill="#d9ebe2">one </tspan><tspan fill="#ffb000" filter="url(#amber-glow)">opencode Go</tspan><tspan fill="#d9ebe2"> subscription. every model.</tspan>
</text>

<!-- divider -->
<line x1="0" y1="128" x2="900" y2="128" stroke="rgba(214,232,223,0.10)" stroke-width="1"/>

<!-- ═══ PIPELINE (y 128→460) ═══ -->

<!-- section label -->
<circle cx="40" cy="149" r="3.5" fill="#4fd8c4" class="proxy-dot"/>
<text x="52" y="153" font-size="10" fill="#6f8a80">live routing — every request takes this exact path</text>

<!-- wire: claude code → proxy -->
<line x1="230" y1="307" x2="305" y2="307" stroke="rgba(214,232,223,0.30)" stroke-width="1.5"/>
<polygon points="303,302 313,307 303,312" fill="rgba(214,232,223,0.30)"/>

<!-- fan wires from proxy right edge (510,307) to models -->
<path class="wire-0" d="M 510 307 C 600 307 618 185 695 185" fill="none" stroke-width="1.5"/>
<path class="wire-1" d="M 510 307 C 600 307 618 246 695 246" fill="none" stroke-width="1.5"/>
<path class="wire-2" d="M 510 307 C 600 307 618 307 695 307" fill="none" stroke-width="1.5"/>
<path class="wire-3" d="M 510 307 C 600 307 618 368 695 368" fill="none" stroke-width="1.5"/>
<path class="wire-4" d="M 510 307 C 600 307 618 429 695 429" fill="none" stroke-width="1.5"/>

<!-- ═══ NODE: claude code (x=30 y=242 w=200 h=130) ═══ -->
<!-- shadow/glow base -->
<rect x="28" y="240" width="204" height="134" rx="7" fill="rgba(255,176,0,0.04)"/>
<!-- main box -->
<rect x="30" y="242" width="200" height="130" rx="6" fill="#0c0f0e" stroke="rgba(214,232,223,0.22)" stroke-width="1"/>
<!-- chrome bar: rounded top, flat bottom -->
<path d="M 36,243 H 224 A 5,5,0,0,1 229,248 V 270 H 31 V 248 A 5,5,0,0,1 36,243 Z" fill="#111513"/>
<!-- dots -->
<circle cx="51" cy="256" r="5" fill="#ff5f56"/>
<circle cx="67" cy="256" r="5" fill="#ffbd2e"/>
<circle cx="83" cy="256" r="5" fill="#27c93f"/>
<!-- label -->
<text x="99" y="261" font-size="10" fill="#6f8a80">claude code</text>
<!-- chrome separator -->
<line x1="31" y1="270" x2="229" y2="270" stroke="rgba(214,232,223,0.08)" stroke-width="1"/>
<!-- command -->
<text x="50" y="297" font-size="12" fill="#ffb000">$</text>
<text x="63" y="297" font-size="12" fill="#d9ebe2">opclaude</text>
<text x="143" y="297" font-size="12" fill="#ffb000" class="cursor">█</text>
<!-- hint lines -->
<text x="50" y="318" font-size="10" fill="#2e4039">--model deepseek-v4-pro</text>
<text x="50" y="335" font-size="10" fill="#2e4039">--model kimi-2.7</text>

<!-- ═══ NODE: opclaude proxy (x=310 y=242 w=200 h=130) ═══ -->
<!-- shadow/glow base -->
<rect x="308" y="240" width="204" height="134" rx="7" fill="rgba(79,216,196,0.04)"/>
<!-- main box with teal border -->
<rect x="310" y="242" width="200" height="130" rx="6" fill="#0c0f0e" stroke="rgba(79,216,196,0.32)" stroke-width="1"/>
<!-- chrome bar: teal-tinted, rounded top flat bottom -->
<path d="M 316,243 H 504 A 5,5,0,0,1 509,248 V 270 H 311 V 248 A 5,5,0,0,1 316,243 Z" fill="#091211"/>
<!-- label in teal -->
<text x="410" y="261" font-size="10" fill="#4fd8c4" text-anchor="middle" filter="url(#teal-glow)">opclaude proxy</text>
<!-- chrome separator -->
<line x1="311" y1="270" x2="509" y2="270" stroke="rgba(79,216,196,0.12)" stroke-width="1"/>
<!-- log line -->
<text x="326" y="294" font-size="10" fill="#3d5a50">routing request...</text>
<text x="326" y="314" font-size="11" fill="#4fd8c4">→</text>
<text x="344" y="314" font-size="11" fill="#6f8a80">deepseek-v4-pro</text>
<!-- sub line -->
<text x="326" y="351" font-size="9" fill="#2e4039">127.0.0.1 only · key never leaves machine</text>

<!-- ═══ MODEL TARGETS ═══ -->

<!-- kimi-2.7  (#ff6b57) center y=185 box y=163 -->
<g class="target-0">
  <rect x="695" y="163" width="175" height="44" rx="4" fill="#0c0f0e" stroke="rgba(255,107,87,0.55)" stroke-width="1"/>
  <circle cx="715" cy="185" r="4.5" fill="#ff6b57"/>
  <text x="728" y="181" font-size="11" font-weight="bold" fill="#d9ebe2">kimi-2.7</text>
  <text x="728" y="195" font-size="9" fill="#6f8a80">moonshot ai · long context</text>
</g>

<!-- qwen-3.5-plus (#4d9bff) center y=246 box y=224 -->
<g class="target-1">
  <rect x="695" y="224" width="175" height="44" rx="4" fill="#0c0f0e" stroke="rgba(77,155,255,0.55)" stroke-width="1"/>
  <circle cx="715" cy="246" r="4.5" fill="#4d9bff"/>
  <text x="728" y="242" font-size="11" font-weight="bold" fill="#d9ebe2">qwen-3.5-plus</text>
  <text x="728" y="256" font-size="9" fill="#6f8a80">alibaba · max_tokens 8192</text>
</g>

<!-- deepseek-v4-pro (#b388ff) center y=307 box y=285 — DEFAULT -->
<g class="target-2">
  <rect x="695" y="285" width="175" height="44" rx="4" fill="#0c0f0e" stroke="rgba(179,136,255,0.55)" stroke-width="1"/>
  <circle cx="715" cy="307" r="4.5" fill="#b388ff"/>
  <text x="728" y="303" font-size="11" font-weight="bold" fill="#d9ebe2">deepseek-v4-pro</text>
  <text x="728" y="317" font-size="9" fill="#ffb000">default · no flag needed</text>
</g>

<!-- glm-5.2 (#e7d24a) center y=368 box y=346 -->
<g class="target-3">
  <rect x="695" y="346" width="175" height="44" rx="4" fill="#0c0f0e" stroke="rgba(231,210,74,0.55)" stroke-width="1"/>
  <circle cx="715" cy="368" r="4.5" fill="#e7d24a"/>
  <text x="728" y="364" font-size="11" font-weight="bold" fill="#d9ebe2">glm-5.2</text>
  <text x="728" y="378" font-size="9" fill="#6f8a80">zhipu ai · thinking stripped</text>
</g>

<!-- minimax-m3 (#ff5fa8) center y=429 box y=407 -->
<g class="target-4">
  <rect x="695" y="407" width="175" height="44" rx="4" fill="#0c0f0e" stroke="rgba(255,95,168,0.55)" stroke-width="1"/>
  <circle cx="715" cy="429" r="4.5" fill="#ff5fa8"/>
  <text x="728" y="425" font-size="11" font-weight="bold" fill="#d9ebe2">minimax-m3</text>
  <text x="728" y="439" font-size="9" fill="#6f8a80">204800-token context</text>
</g>

</svg>
